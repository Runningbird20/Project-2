{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <h2 class="mb-3">Create a Job Post</h2>
      <p class="text-muted">Use this page to create a new job post in the <strong>jobposts</strong> app.</p>

      <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        {{ template_data.form.as_p }}
        <button type="submit" class="btn btn-dark">Create Job Post</button>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
