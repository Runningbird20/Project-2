{% extends 'base.html' %}
{% block content %}
<section class="page-shell">

    <div class="row justify-content-center">
      <div class="col-md-9 col-lg-6">
        <div class="surface-card">
          <div class="page-intro text-start mb-3">
            <p class="page-kicker">Account recovery</p>
            <h1 class="page-title page-title-sm">Check Your Email</h1>

        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
