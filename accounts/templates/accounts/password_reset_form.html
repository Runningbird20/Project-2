{% extends 'base.html' %}
{% block content %}
<section class="page-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-9 col-lg-6">
        <div class="surface-card">
          <div class="page-intro text-start mb-3">
            <p class="page-kicker">Account recovery</p>
            <h1 class="page-title page-title-sm">Forgot Password</h1>
          </div>
          <p class="surface-copy">Enter your email and we will send a password reset link.</p>
          <form method="post" class="vstack gap-3">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="field-block">
              <label for="{{ form.email.id_for_label }}">Email</label>
              {{ form.email }}
            </div>
            <div class="form-actions">
              <button type="submit" class="primary-btn border-0">Send Reset Link</button>
              <a class="secondary-btn" href="{% url 'accounts.login' %}">Back to login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
