{% extends 'base.html' %}
{% block content %}
<section class="page-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-9 col-lg-6">
        <div class="surface-card">
          <div class="page-intro text-start mb-3">
            <p class="page-kicker">Welcome back</p>
            <h1 class="page-title page-title-sm">Log in to PandaPulse</h1>
          </div>
            {% if template_data.error %}
            <div class="alert alert-danger" role="alert">
              {{ template_data.error }}
            </div>
            {% endif %}
            <form method="POST" class="vstack gap-3">
              {% csrf_token %}
              <div class="field-block">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required
                  autocomplete="username" class="form-control">
              </div>
              <div class="field-block">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required
                  autocomplete="current-password" class="form-control">
              </div>
              <div class="form-actions">
                <button type="submit" class="primary-btn border-0">
                  Log in
                </button>
                <a class="secondary-btn" href="{% url 'accounts.signup' %}">
                  Create account
                </a>
              </div>
            </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
