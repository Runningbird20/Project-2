{% extends 'base.html' %}
{% block content %}
<section class="page-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-9 col-lg-6">
        <div class="surface-card">
          <div class="page-intro text-start mb-3">
            <p class="page-kicker">Account recovery</p>
            <h1 class="page-title page-title-sm">Forgot Username</h1>
          </div>
          <p class="surface-copy">Enter your account email and we will send your username.</p>
          <form method="post" class="vstack gap-3">
            {% csrf_token %}
            <div class="field-block">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required class="form-control" autocomplete="email">
            </div>
            <div class="form-actions">
              <button type="submit" class="primary-btn border-0">Send Username</button>
              <a class="secondary-btn" href="{% url 'accounts.login' %}">Back to login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
